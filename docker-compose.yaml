services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - playwright
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}'
      - 'ENABLE_SIGNUP=${ENABLE_SIGNUP-false}'
      - 'WEBUI_NAME=${WEBUI_NAME-AI创作平台}'
      - 'ENABLE_OLLAMA_API=false'
      - 'OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL-https://api.deepseek.com}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - 'ENABLE_IMAGE_GENERATION=true'
      - 'IMAGE_GENERATION_ENGINE=seedream'
      - 'SEEDREAM_API_KEY=${SEEDREAM_API_KEY}'
      - 'SEEDREAM_MODEL=${SEEDREAM_MODEL-doubao-seedream-5-0-260128}'
      - 'WEB_LOADER_ENGINE=playwright'
      - 'PLAYWRIGHT_WS_URL=ws://playwright:3000'
      - 'ENABLE_ADMIN_CHAT_ACCESS=true'
      - 'ENABLE_CHANNELS=false'
      - 'ENABLE_COMMUNITY_SHARING=false'
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    container_name: playwright
    command: npx -y playwright@1.60.0 run-server --port 3000 --host 0.0.0.0
    restart: unless-stopped

volumes:
  open-webui: {}
